<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="portal-container">

    <img src="logo.png" class="logo">

<h2>🏫 SchoolConnect AI Result Sheet</h2>

    <p id="studentInfo"></p>
<hr>

<p><strong>Session:</strong> 2025/2026</p>
<p><strong>Term:</strong> First Term</p>
    <table border="1" width="100%" id="resultTable">
        <tr>
            <th>Subject</th>
            <th>CA1</th>
            <th>CA2</th>
            <th>Exam</th>
            <th>Total</th>
        </tr>
    
    </table>
<button onclick="checkResult()">Check Result</button>
    <h3 id="average"></h3>
    <h3 id="grade"></h3>

    <button onclick="window.print()">🖨️ Print Result</button>
<hr>

<p>Class Teacher Signature: __________________</p>
<p>Principal Signature: __________________</p>
</div>

<script src="result.js"></script>

</body>
</html>

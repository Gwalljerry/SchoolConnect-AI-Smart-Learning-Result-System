<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="portal-container">

    <h2>🧾 Student Result</h2>

    <p id="studentInfo"></p>

    <table border="1" width="100%" id="resultTable">
        <tr>
            <th>Subject</th>
            <th>CA1</th>
            <th>CA2</th>
            <th>Exam</th>
            <th>Total</th>
        </tr>
    </table>

    <h3 id="average"></h3>
    <h3 id="grade"></h3>

    <button onclick="window.print()">🖨️ Print Result</button>

</div>

<script src="result.js"></script>

</body>
</html>

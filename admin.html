<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="portal-container">

<h2>🔐 Admin Panel</h2>

<input type="password" id="adminPass" placeholder="Enter Admin Password" class="input">

<button onclick="loginAdmin()">Login</button>

<div id="adminArea" style="display:none; margin-top:20px;">

    <h3>👨‍🏫 Teacher Control</h3>

    <button onclick="approve()">Approve Teacher</button>

    <button onclick="logout()">Logout</button>

</div>

</div>

<script>

function loginAdmin() {
    let pass = document.getElementById("adminPass").value;

    if (pass === "gwall2026") {
        document.getElementById("adminArea").style.display = "block";
    } else {
        alert("Wrong password");
    }
}

function approve() {
    localStorage.setItem("teacherApproved", "true");
    alert("Teacher Approved!");
}

function logout() {
    window.location.href = "portal.html";
}

</script>

</body>
</html>

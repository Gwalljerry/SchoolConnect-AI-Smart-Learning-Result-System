<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="portal-container">

    <h2>👨‍🎓 Student Login</h2>

    <!-- Name Input -->
    <input type="text" id="name" placeholder="Enter your name" class="input">

    <!-- Class Selection -->
    <select id="class" class="input">
        <option value="">Select Class</option>
        <option>JS1</option>
        <option>JS2</option>
        <option>JS3</option>
        <option>SS1</option>
        <option>SS2</option>
        <option>SS3</option>
    </select>

    <!-- Login Button -->
    <button onclick="login()">Login</button>

    <!-- Link to Signup -->
    <p>No account? <a href="signup.html">Sign Up</a></p>

</div>

<!-- Connect JavaScript -->
<script src="script.js"></script>

</body>
</html>
